<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shopping</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Modern Shopping</h1>
            <p>Experience the future of online shopping</p>
            <nav class="nav">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link">Products</a>
                <a href="#" class="nav-link">Cart</a>
                <a href="#" class="nav-link">Profile</a>
            </nav>
        </header>

        <div class="grid">
            <div class="card">
                <h3>Featured Products</h3>
                <p>Discover our latest collection with modern design and premium quality.</p>
                <button class="btn">Explore Now</button>
            </div>

            <div class="card">
                <h3>Special Offers</h3>
                <p>Get exclusive deals and discounts on your favorite items.</p>
                <button class="btn">View Offers</button>
            </div>

            <div class="card">
                <h3>Quick Order</h3>
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="Search products...">
                </div>
                <button class="btn">Search</button>
            </div>
        </div>
    </div>

    <script src="js/modern-script.js"></script>
</body>
</html>
